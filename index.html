<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Website Title -->
    <title>Taaffeite Events | Luxury Wedding Planners in Bangalore</title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Taaffeite Events is a luxury wedding planning studio based in Bangalore specializing in destination weddings, bespoke decor, and sustainable celebrations."
    />
    <meta name="author" content="Taaffeite Events" />

    <!-- Open Graph (Social Sharing) -->
    <meta property="og:title" content="Taaffeite Events | Luxury Wedding Planners" />
    <meta
      property="og:description"
      content="Luxury wedding planners crafting rare and timeless celebrations with bespoke decor and destination experiences."
    />
    <meta property="og:type" content="website" />

    <!-- Replace this later with your brand preview image -->
    <meta property="og:image" content="/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Taaffeite Events | Luxury Wedding Planners" />
    <meta
      name="twitter:description"
      content="Luxury wedding planning, destination celebrations, bespoke decor, and sustainable events."
    />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Favicon (replace later with your logo) -->
    <link rel="icon" type="image/png" href="/favicon.png" />

  </head>

  <body>
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
